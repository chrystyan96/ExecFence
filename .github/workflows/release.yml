name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - id: tag-source
        run: |
          git fetch --force origin master:refs/remotes/origin/master
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          MASTER_COMMIT="$(git rev-parse refs/remotes/origin/master)"
          if [ "$TAG_COMMIT" != "$MASTER_COMMIT" ]; then
            echo "::error::Release tag $GITHUB_REF_NAME must point at the current origin/master commit."
            echo "::error::tag=$TAG_COMMIT master=$MASTER_COMMIT"
            exit 1
          fi
          echo "tag_commit=${TAG_COMMIT}" >> "$GITHUB_OUTPUT"
      - id: release-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+][0-9A-Za-z.-]+)?$'; then
            echo "::error::package.json version ($VERSION) is not a valid release version."
            exit 1
          fi
          if [ "$TAG_VERSION" != "$VERSION" ]; then
            echo "::error::Release tag ($GITHUB_REF_NAME) must match package.json version ($VERSION)."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - id: npm-version
        run: |
          VERSION="${{ steps.release-version.outputs.version }}"
          if npm view "execfence@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "::error::execfence@${VERSION} is already published on npm."
            exit 1
          fi
      - run: npm ci
      - run: npm test
      - run: npm run helper:smoke
      - run: node bin/execfence.js run -- npm test
      - run: node bin/execfence.js ci
      - run: npm run scan
      - run: node bin/execfence.js scan --ci --format sarif . > execfence.sarif
      - run: node bin/execfence.js manifest
      - run: node bin/execfence.js pack-audit
      - run: npm publish --access public --provenance
